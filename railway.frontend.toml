[build]
builder = "nixpacks"

[build.nixpacks]
installPhase = "npm ci"
buildPhase = "npm run build:frontend"
startPhase = "npm run start:frontend"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "always"

[env]
NODE_ENV = "production"
PORT = "3002"
NEXT_PUBLIC_API_URL = "${{backend.RAILWAY_PUBLIC_DOMAIN}}"

[services.frontend]
staticPublishPath = ".next/static" 